name: Daily News + Screenshots
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {token: '${{ secrets.PAT }}'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Scrape news
        run: python news_scraper.py > news_latest.json
      - name: Screenshot sites
        uses: browser-actions/setup-chrome@latest
      - run: |
          npm install playwright 2>/dev/null
          npx playwright install chromium 2>/dev/null
          node -e "
            const { chromium } = require('playwright');
            (async () => {
              const browser = await chromium.launch();
              for (const [name, url] of [['bbc','https://www.bbc.com/news'],['reuters','https://www.reuters.com'],['bloomberg','https://www.bloomberg.com']]) {
                try {
                  const page = await browser.newPage();
                  await page.goto(url, {waitUntil:'load',timeout:15000});
                  await page.screenshot({path: name+'.png', fullPage: false});
                  console.log(name+': OK');
                } catch(e) { console.log(name+': '+e.message); }
              }
              await browser.close();
            })();
          "
      - uses: actions/upload-artifact@v4
        with: {name: screenshots, path: '*.png'}
      - name: Push
        run: |
          git config user.name bot; git config user.email bot@n
          git add news_latest.json || true
          git commit -m "Update $(date +%Y-%m-%d)" --allow-empty
          git push

  screenshot:
    runs-on: ubuntu-latest
    needs: fetch
    steps:
      - uses: actions/checkout@v4
        with: {token: '${{ secrets.PAT }}'}
      - uses: actions/download-artifact@v4
        with: {name: screenshots}
      - run: |
          git add *.png
          git commit -m "Add screenshots $(date +%Y-%m-%d)" || true
          git push

