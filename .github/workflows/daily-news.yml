name: News + Screenshots
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {token: '${{ secrets.PAT }}'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python news_scraper.py > news_latest.json
      - name: Screenshot with system Chrome
        run: |
          pip install playwright
          python -c "
import os
from playwright.sync_api import sync_playwright
sites = [('bbc','https://www.bbc.com/news'),('reuters','https://www.reuters.com'),('bloomberg','https://www.bloomberg.com')]
with sync_playwright() as p:
    b = p.chromium.launch(channel='chrome', headless=True)
    for name, url in sites:
        try:
            page = b.new_page()
            page.goto(url, wait_until='commit', timeout=10000)
            page.screenshot(path=f'{name}.png')
            print(f'{name}: OK')
        except Exception as e:
            print(f'{name}: {e}')
    b.close()
"
      - uses: actions/upload-artifact@v4
        with: {name: screenshots, path: '*.png'}
      - run: |
          git config user.name bot; git config user.email bot@n
          git add news_latest.json || true
          git commit -m "Update" --allow-empty
          git push

