name: Daily News
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Scrape news
        run: python news_scraper.py > news.json
      - name: Commit result
        run: |
          gh api repos/${{ github.repository }}/contents/news_latest.json -f message="Daily update" -f content="$(base64 -w0 news.json)" -f sha="$(gh api repos/${{ github.repository }}/contents/news_latest.json --jq .sha 2>/dev/null || echo '')" || true
        env:
          GH_TOKEN: ${{ github.token }}

