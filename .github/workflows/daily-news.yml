name: China News Briefing
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install python-docx
      - name: Scrape China news
        run: python news_scraper.py > china_news_raw.json
      - name: Generate Word doc with translations
        run: python generate_docx.py china_news_raw.json China_News_Briefing.docx
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: china-briefing
          path: '*.docx'
      - run: |
          git config user.name bot
          git config user.email bot@n
          cp china_news_raw.json china_news_latest.json
          git add china_news_latest.json || true
          git commit -m "Auto update" --allow-empty
          git push
