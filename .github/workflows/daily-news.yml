name: Daily News
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Scrape
        run: python news_scraper.py > news_latest.json
      - name: Push to repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name bot
          git config user.email bot@n
          git add news_latest.json
          git commit -m "Update $(date +%Y-%m-%d)" && git push || echo "no changes"  

