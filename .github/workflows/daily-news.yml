name: Daily News Brief

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch all news sources
        run: python news_scraper.py > news_$(date +%Y%m%d).json
      - name: Upload news data
        uses: actions/upload-artifact@v4
        with:
          name: news-$(date +%Y%m%d)
          path: news_*.json
