name: Daily News Brief

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch all news sources
        run: python news_scraper.py > docs/news_latest.json
      - name: Commit news data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news_latest.json
          git diff --cached --quiet || git commit -m "📰 News update $(date +%Y-%m-%d)"
          git push
