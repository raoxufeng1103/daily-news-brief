name: News + Screenshots
on:
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
      - uses: browser-actions/setup-chrome@v1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python news_scraper.py > news_latest.json
      - name: Screenshot via Chrome
        run: |
          chrome --headless --disable-gpu --no-sandbox --screenshot=bbc.png --window-size=1280,900 "https://www.bbc.com/news"
          chrome --headless --disable-gpu --no-sandbox --screenshot=reuters.png --window-size=1280,900 "https://www.reuters.com"
          chrome --headless --disable-gpu --no-sandbox --screenshot=bloomberg.png --window-size=1280,900 "https://www.bloomberg.com"
          ls -la *.png
      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: '*.png'
