name: Daily News
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {token: '${{ secrets.PAT }}'}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python news_scraper.py > news_latest.json
      - run: |
          git config user.name bot
          git config user.email bot@n
          git add news_latest.json
          git commit -m "Update $(date +%Y-%m-%d)" || true
          git push

