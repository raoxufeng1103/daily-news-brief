name: Daily News
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
permissions: {contents: write}
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Scrape news
        run: python news_scraper.py > news_latest.json 2>&1
      - name: Commit to repo
        run: |
          git config user.name "NewsBot"
          git config user.email "bot@news"
          git add news_latest.json
          git commit -m "Update $(date +%Y-%m-%d)" --allow-empty
          git pull --rebase origin main
          git push origin main

