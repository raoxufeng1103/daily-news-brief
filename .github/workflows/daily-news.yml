name: Daily News
on:
  schedule: [{cron: '0 23 * * *'}]
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Scrape
        run: python news_scraper.py > news.json
      - name: Auto-commit
        run: |
          curl -X PUT             -H "Authorization: token ${{ secrets.PAT }}"             -H "Accept: application/vnd.github.v3+json"             -d "{\"message\":\"Daily update\",\"content\":\"$(base64 -w0 news.json)\""             "https://api.github.com/repos/${{ github.repository }}/contents/news_latest.json"

